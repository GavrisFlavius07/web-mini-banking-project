services:
  my_web:
    user: ${MY_UID}:${MY_GID}
    build:
      context: ./build
      dockerfile: Dockerfile.php
      args:
        UID: ${MY_UID}
        GID: ${MY_GID}      
    ports:
      - 8080:80
    volumes:
      - "./php:/var/www/html"
    depends_on:
      - my_mariadb

  my_mariadb:
    build:
      context: ./build
      dockerfile: Dockerfile.mariadb
      args:
        UID: ${MY_UID}
        GID: ${MY_GID}
    environment:
      - MARIADB_ROOT_PASSWORD=ciccio
      - MARIADB_DATABASE=banking
    volumes:
      # Init scripts run only when this volume is empty.
      # Force a clean DB reload with: docker compose down -v
      - "mariadb_data:/var/lib/mysql"
      - "./build/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro"

  my_phpMyAdmin:
    image: phpmyadmin
    ports:
      - 8081:80
    environment:
      - PMA_HOST=my_mariadb

  my_node:
    user: ${MY_UID}:${MY_GID}
    build:
      context: ./build
      dockerfile: Dockerfile.node
      args:
        UID: ${MY_UID}
        GID: ${MY_GID}
    ports:
      - 3000:3000
    volumes:
      - "./app:/app"

volumes:
  mariadb_data:
